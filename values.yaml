## Global image settings
global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

## Shared environment config (non-sensitive)
config:
  ## Leave empty to auto-resolve from libsql service name
  DATABASE_URL: ""
  DATABASE_AUTH_TOKEN: ""
  NODE_ENV: "production"
  FLY_REGION: "self-hosted"
  SELF_HOST: "true"
  NEXT_PUBLIC_URL: "http://localhost:3000"
  TURBO_ENV_MODE: "loose"

## Sensitive environment variables stored in a Secret
secrets:
  ## Required
  AUTH_SECRET: ""
  RESEND_API_KEY: ""
  ## Optional - Authentication
  AUTH_GITHUB_ID: ""
  AUTH_GITHUB_SECRET: ""
  AUTH_GOOGLE_ID: ""
  AUTH_GOOGLE_SECRET: ""
  ## Optional - Stripe
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET_KEY: ""
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ""
  ## Optional - Vercel
  PROJECT_ID_VERCEL: ""
  TEAM_ID_VERCEL: ""
  VERCEL_AUTH_BEARER_TOKEN: ""
  BLOB_READ_WRITE_TOKEN: ""
  ## Optional - Observability
  NEXT_PUBLIC_SENTRY_DSN: ""
  SENTRY_AUTH_TOKEN: ""
  NEXT_PUBLIC_OPENPANEL_CLIENT_ID: ""
  OPENPANEL_CLIENT_SECRET: ""
  ## Optional - Integrations
  PAGERDUTY_APP_ID: ""
  SLACK_SUPPORT_WEBHOOK_URL: ""
  TELEGRAM_BOT_TOKEN: ""
  ## Optional - API keys
  UNKEY_API_ID: ""
  UNKEY_TOKEN: ""
  SUPER_ADMIN_TOKEN: ""
  CRON_SECRET: ""
  ## Optional - Analytics
  TINY_BIRD_API_KEY: ""
  ## Optional - Redis/Queue
  UPSTASH_REDIS_REST_URL: ""
  UPSTASH_REDIS_REST_TOKEN: ""
  QSTASH_CURRENT_SIGNING_KEY: ""
  QSTASH_NEXT_SIGNING_KEY: ""
  QSTASH_TOKEN: ""
  QSTASH_URL: ""
  ## Optional - GCP
  GCP_PROJECT_ID: ""
  GCP_LOCATION: ""
  GCP_CLIENT_EMAIL: ""
  GCP_PRIVATE_KEY: ""

## Use an existing secret instead of creating one from values above
existingSecret: ""

# ---------------------------------------------------------------------------
# LibSQL - Application Database (StatefulSet)
# ---------------------------------------------------------------------------
libsql:
  enabled: true
  image:
    repository: ghcr.io/tursodatabase/libsql-server
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  service:
    type: ClusterIP
    httpPort: 8080
    grpcPort: 5001
  healthcheck:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5

# ---------------------------------------------------------------------------
# Tinybird Local - Analytics Engine (optional)
# ---------------------------------------------------------------------------
tinybird:
  enabled: false
  image:
    repository: tinybirdco/tinybird-local
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  service:
    type: ClusterIP
    port: 7181
  healthcheck:
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5

# ---------------------------------------------------------------------------
# Workflows Service
# ---------------------------------------------------------------------------
workflows:
  replicaCount: 1
  image:
    repository: ghcr.io/openstatushq/openstatus-workflows
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  service:
    type: ClusterIP
    port: 3000
  env:
    PORT: "3000"
  healthcheck:
    path: /ping
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Server (API)
# ---------------------------------------------------------------------------
server:
  replicaCount: 1
  image:
    repository: ghcr.io/openstatushq/openstatus-server
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  service:
    type: ClusterIP
    port: 3000
  env:
    PORT: "3000"
  healthcheck:
    path: /ping
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Checker
# ---------------------------------------------------------------------------
checker:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/openstatushq/openstatus-checker
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  service:
    type: ClusterIP
    port: 8080
  env:
    PORT: "8080"
  healthcheck:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Private Location
# ---------------------------------------------------------------------------
privateLocation:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/openstatushq/openstatus-private-location
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  service:
    type: ClusterIP
    port: 8080
  env:
    PORT: "8080"
    GIN_MODE: "release"
  healthcheck:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Dashboard (Frontend)
# ---------------------------------------------------------------------------
dashboard:
  replicaCount: 1
  image:
    repository: ghcr.io/openstatushq/openstatus-dashboard
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  service:
    type: ClusterIP
    port: 3000
  env:
    PORT: "3000"
    HOSTNAME: "0.0.0.0"
    AUTH_TRUST_HOST: "true"
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hostname: dashboard.example.com
    tls: []

# ---------------------------------------------------------------------------
# Status Page (Frontend)
# ---------------------------------------------------------------------------
statusPage:
  replicaCount: 1
  image:
    repository: ghcr.io/openstatushq/openstatus-status-page
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  service:
    type: ClusterIP
    port: 3000
  env:
    PORT: "3000"
    HOSTNAME: "0.0.0.0"
    AUTH_TRUST_HOST: "true"
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hostname: status.example.com
    tls: []
