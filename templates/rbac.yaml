apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openstatus.fullname" . }}-migrate-watcher
  labels:
    {{- include "openstatus.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openstatus.fullname" . }}-migrate-watcher
  labels:
    {{- include "openstatus.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "openstatus.fullname" . }}-migrate-watcher
  labels:
    {{- include "openstatus.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "openstatus.fullname" . }}-migrate-watcher
subjects:
  - kind: ServiceAccount
    name: {{ include "openstatus.fullname" . }}-migrate-watcher
