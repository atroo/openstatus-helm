apiVersion: v1
kind: Service
metadata:
  name: {{ include "openstatus.fullname" . }}-status-page
  labels:
    {{- include "openstatus.componentLabels" (dict "context" . "component" "status-page") | nindent 4 }}
spec:
  type: {{ .Values.statusPage.service.type }}
  ports:
    - name: http
      port: {{ .Values.statusPage.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "openstatus.selectorLabels" (dict "context" . "component" "status-page") | nindent 4 }}
