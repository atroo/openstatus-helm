apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openstatus.fullname" . }}-status-page
  labels:
    {{- include "openstatus.componentLabels" (dict "context" . "component" "status-page") | nindent 4 }}
spec:
  replicas: {{ .Values.statusPage.replicaCount }}
  selector:
    matchLabels:
      {{- include "openstatus.selectorLabels" (dict "context" . "component" "status-page") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openstatus.componentLabels" (dict "context" . "component" "status-page") | nindent 8 }}
    spec:
      {{- include "openstatus.imagePullSecrets" . | nindent 6 }}
      initContainers:
        {{- include "openstatus.waitFor" (dict "name" "libsql" "host" (include "openstatus.libsqlHost" .) "port" "8080" "path" "/") | nindent 8 }}
        {{- include "openstatus.waitFor" (dict "name" "workflows" "host" (include "openstatus.workflowsHost" .) "port" (toString .Values.workflows.service.port) "path" "/ping") | nindent 8 }}
        {{- include "openstatus.waitFor" (dict "name" "server" "host" (include "openstatus.serverHost" .) "port" (toString .Values.server.service.port) "path" "/ping") | nindent 8 }}
      containers:
        - name: status-page
          image: "{{ .Values.statusPage.image.repository }}:{{ .Values.statusPage.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "openstatus.configMapName" . }}
            - secretRef:
                name: {{ include "openstatus.secretName" . }}
          env:
            - name: PORT
              value: {{ .Values.statusPage.env.PORT | quote }}
            - name: HOSTNAME
              value: {{ .Values.statusPage.env.HOSTNAME | quote }}
            - name: AUTH_TRUST_HOST
              value: {{ .Values.statusPage.env.AUTH_TRUST_HOST | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.statusPage.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.statusPage.resources | nindent 12 }}
