{{- if .Values.privateLocation.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openstatus.fullname" . }}-private-location
  labels:
    {{- include "openstatus.componentLabels" (dict "context" . "component" "private-location") | nindent 4 }}
spec:
  type: {{ .Values.privateLocation.service.type }}
  ports:
    - name: http
      port: {{ .Values.privateLocation.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "openstatus.selectorLabels" (dict "context" . "component" "private-location") | nindent 4 }}
{{- end }}
