{{- if .Values.dbMigrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "openstatus.fullname" . }}-db-migrate
  labels:
    {{- include "openstatus.componentLabels" (dict "context" . "component" "db-migrate") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "openstatus.componentLabels" (dict "context" . "component" "db-migrate") | nindent 8 }}
    spec:
      {{- include "openstatus.imagePullSecrets" . | nindent 6 }}
      restartPolicy: OnFailure
      initContainers:
        {{- include "openstatus.waitForTcp" (dict "name" "libsql" "host" (include "openstatus.libsqlHost" .) "port" "8080") | nindent 8 }}
      containers:
        - name: db-migrate
          image: "{{ .Values.dbMigrate.image.repository }}:{{ .Values.dbMigrate.image.tag }}"
          workingDir: /app/packages/db
          command: ["sh", "-c", "bun install && bun run migrate"]
          envFrom:
            - configMapRef:
                name: {{ include "openstatus.configMapName" . }}
            - secretRef:
                name: {{ include "openstatus.secretName" . }}
          resources:
            {{- toYaml .Values.dbMigrate.resources | nindent 12 }}
{{- end }}
