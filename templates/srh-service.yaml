{{- if and .Values.redis.enabled .Values.serverlessRedisHttp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openstatus.fullname" . }}-srh
  labels:
    {{- include "openstatus.componentLabels" (dict "context" . "component" "srh") | nindent 4 }}
spec:
  type: {{ .Values.serverlessRedisHttp.service.type }}
  ports:
    - name: http
      port: {{ .Values.serverlessRedisHttp.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "openstatus.selectorLabels" (dict "context" . "component" "srh") | nindent 4 }}
{{- end }}
