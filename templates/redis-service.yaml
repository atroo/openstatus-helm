{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openstatus.fullname" . }}-redis
  labels:
    {{- include "openstatus.componentLabels" (dict "context" . "component" "redis") | nindent 4 }}
spec:
  type: {{ .Values.redis.service.type }}
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "openstatus.selectorLabels" (dict "context" . "component" "redis") | nindent 4 }}
{{- end }}
